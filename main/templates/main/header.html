<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timur's Portfolio - Computer Engineering Projects</title>
    {% load static %}
    {% if debug %}
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    {% endif %}
    
    <!-- Google Fonts: Inter + JetBrains Mono (Kaveen-style dev UI) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Prism CSS -->
    <link href="{% static "tinymce/css/prism.css" %}" rel="stylesheet">
    
    <!-- Compiled and minified CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    
    <!-- Custom Modern CSS (?v= forces fresh download when STATIC_ASSET_VERSION bumps) -->
    <link rel="stylesheet" href="{% static 'main/css/custom.css' %}?v={{ STATIC_ASSET_VERSION }}">
    
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <!-- Compiled and minified JavaScript for Materialize CSS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    
    <style>
      /* Particle Background Canvas */
      #particle-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
        /* Default site theme is terminal (dark); lighter when user toggles to gradient */
        opacity: 0.35;
        transition: opacity 0.5s ease;
      }
      
      body:not(.terminal-theme) #particle-canvas {
        opacity: 0.14;
      }
      
      .modern-container {
        position: relative;
        z-index: 1;
      }
      
      .modern-nav {
        position: relative;
        z-index: 1000;
      }
    </style>
</head>

<body class="terminal-theme">
  <!-- Particle Background -->
  <canvas id="particle-canvas"></canvas>
  
  <nav class="modern-nav">
    <div class="nav-wrapper">
      <a href="/" class="brand-logo">✨ Timur's Projects</a>
      <ul id="nav-mobile" class="right hide-on-med-and-down">
        {% include 'main/includes/navbar.html'%}
      </ul>
    </div>
  </nav>
  
  {% if messages %}
    {% for message in messages %}
        {% include 'main/includes/messaging.html'%}
    {% endfor %}
  {% endif %}
  
  <div class="modern-container">
      {% block content %}
      {% endblock %}
  </div>
  
  <!-- Theme Toggle Button -->
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <span id="themeIcon">☀️</span>
  </button>
  
  <!-- Theme: default dark (terminal). Only use gradient if user explicitly chose it before. -->
  <script>
    (function () {
      const themeToggle = document.getElementById('themeToggle');
      const themeIcon = document.getElementById('themeIcon');
      const body = document.body;
      if (!themeToggle || !themeIcon) return;

      function storageGet(key) {
        try { return localStorage.getItem(key); } catch (e) { return null; }
      }
      function storageSet(key, val) {
        try { localStorage.setItem(key, val); } catch (e) { /* ignore */ }
      }

      if (storageGet('theme') === 'gradient') {
        body.classList.remove('terminal-theme');
        themeIcon.textContent = '🌙';
      } else {
        body.classList.add('terminal-theme');
        themeIcon.textContent = '☀️';
      }

      themeToggle.addEventListener('click', function () {
        body.classList.toggle('terminal-theme');
        if (body.classList.contains('terminal-theme')) {
          themeIcon.textContent = '☀️';
          storageSet('theme', 'terminal');
        } else {
          themeIcon.textContent = '🌙';
          storageSet('theme', 'gradient');
        }
      });
    })();
  </script>
  
  <!-- Particle Animation Script -->
  <script>
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    const particles = [];
    const particleCount = 80;
    
    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.radius = Math.random() * 2 + 1;
      }
      
      update() {
        this.x += this.vx;
        this.y += this.vy;
        
        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
      }
      
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = document.body.classList.contains('terminal-theme') 
          ? 'rgba(0, 255, 157, 0.6)' 
          : 'rgba(255, 255, 255, 0.6)';
        ctx.fill();
      }
    }
    
    // Initialize particles
    for (let i = 0; i < particleCount; i++) {
      particles.push(new Particle());
    }
    
    function connectParticles() {
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const distance = Math.sqrt(dx * dx + dy * dy);
          
          if (distance < 120) {
            ctx.beginPath();
            ctx.strokeStyle = document.body.classList.contains('terminal-theme')
              ? `rgba(0, 255, 157, ${0.2 * (1 - distance / 120)})`
              : `rgba(255, 255, 255, ${0.2 * (1 - distance / 120)})`;
            ctx.lineWidth = 0.5;
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
    }
    
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      particles.forEach(particle => {
        particle.update();
        particle.draw();
      });
      
      connectParticles();
      requestAnimationFrame(animate);
    }
    
    animate();
    
    // Resize handler
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>

<!-- Prism JS -->
<script src="{% static "tinymce/js/prism.js" %}"></script>
</html>
