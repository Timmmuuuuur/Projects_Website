{% extends 'main/header.html' %}

{% block content %}

<div style="max-width: 500px; margin: 3rem auto;">
  <p class="dev-prompt-line dev-font text-center" style="margin-bottom: 1rem;"><span class="dev-user">timur@portfolio</span>:<span class="dev-cmd">~</span>$ <span class="dev-cmd">ssh login</span></p>
  <!-- Login Card -->
  <div class="modern-card fade-in-up terminal-window kaveen-frame">
    <div class="modern-card-header text-center">
      <h1 class="modern-card-title" style="font-size: 2rem;">🔐 Welcome Back</h1>
      <p class="modern-card-subtitle">Sign in to access your account</p>
    </div>
    
    <form method="POST" class="modern-form modern-form--compact" style="padding: 0;">
      {% csrf_token %}
      
      <div class="form-field-wrap">
        <label for="id_username">👤 Username</label>
        {{ form.username }}
      </div>
      
      <div class="form-field-wrap">
        <label for="id_password">🔑 Password</label>
        {{ form.password }}
      </div>
      
      <button type="submit" class="modern-btn kaveen-glow-btn" style="width: 100%; font-size: 1.1rem; margin-top: 1rem;">
        Sign In
      </button>
    </form>
    
    <div class="auth-card-footer" style="margin-top: 2rem; text-align: center; padding-top: 1.5rem; border-top: 2px solid #e5e7eb;">
      <p style="color: #6b7280; margin: 0;">
        Don't have an account? 
        <a href="/register" class="auth-link">Create one here</a>
      </p>
    </div>
  </div>
</div>

{% endblock %}
